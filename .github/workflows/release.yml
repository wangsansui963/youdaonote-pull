# This workflow creates and publishes a GitHub Release with packaged artifacts
# when a new tag is pushed to the repository.

name: Build and Publish Release

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v1.0.0, v1.2.3, etc.

permissions:
  contents: write  # Required to create releases and upload assets

jobs:
  build-release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create release package
        run: |
          # Create a zip file with all necessary files
          zip -r youdaonote-pull-${{ github.ref_name }}.zip \
            pull.py \
            core/ \
            requirements.txt \
            README.md \
            LICENSE.md \
            config.json \
            .gitignore \
            .pre-commit-config.yaml
      
      - name: Create standalone executable (optional)
        run: |
          # Install PyInstaller to create standalone executable
          pip install pyinstaller
          
          # Create spec file for PyInstaller
          cat > pull.spec << EOF
          # -*- mode: python ; coding: utf-8 -*-
          
          block_cipher = None
          
          a = Analysis(
              ['pull.py'],
              pathex=[],
              binaries=[],
              datas=[('core', 'core')],
              hiddenimports=[],
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=[],
              win_no_prefer_redirects=False,
              win_private_assemblies=False,
              cipher=block_cipher,
              noarchive=False,
          )
          
          exe = EXE(
              a,
              a.scripts,
              [],
              exclude_binaries=True,
              name='youdaonote-pull',
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=True,
              console=True,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
          )
          EOF
          
          # Build the executable
          pyinstaller --clean pull.spec
          
          # Package the executable
          cd dist
          zip -r youdaonote-pull-${{ github.ref_name }}-standalone.zip youdaonote-pull/
          cd ..
      
      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            # First release, get all commits
            echo "changes<<EOF" >> $GITHUB_OUTPUT
            git log --pretty=format:"* %s (%h)" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            # Get commits since last tag
            echo "changes<<EOF" >> $GITHUB_OUTPUT
            git log ${PREV_TAG}..HEAD --pretty=format:"* %s (%h)" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## 📦 发布说明
            
            **版本**: ${{ github.ref_name }}
            **发布日期**: $(date +%Y-%m-%d)
            
            ## 🔄 更新内容
            
            ${{ steps.changelog.outputs.changes }}
            
            ## 📥 下载
            
            - **完整源码包**: `youdaonote-pull-${{ github.ref_name }}.zip`
            - **独立可执行文件**: `youdaonote-pull-${{ github.ref_name }}-standalone.zip` (Windows/Linux)
            
            ## 📖 使用说明
            
            详见 [README.md](https://github.com/$ {{ github.repository }}/blob/master/README.md)
            
            ---
            如有问题，请提交 [Issue](https://github.com/$ {{ github.repository }}/issues)
          files: |
            youdaonote-pull-${{ github.ref_name }}.zip
            dist/youdaonote-pull-${{ github.ref_name }}-standalone.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
